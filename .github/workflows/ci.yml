name: CI – Build, Package & Push Docker Image

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'gradle.properties'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build · Native Image · Dockerize · Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Bump patch version ────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(grep '^appVersion=' gradle.properties | cut -d'=' -f2)
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          sed -i "s/^appVersion=.*/appVersion=${NEW_VERSION}/" gradle.properties
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit & push bumped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "ci: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      # ── 3. Install GraalVM + native-image ────────────────────────────────────
      - name: Install GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '22.3.2'
          java-version: '17'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Build Native Image ────────────────────────────────────────────────
      - name: Build Native Image
        run: ./gradlew nativeCompile --no-daemon

      # ── 7. Log in to Docker Hub ──────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            .

      # ── 9. Push Docker image ─────────────────────────────────────────────────
      - name: Push Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      # ── 10. Smoke-test ───────────────────────────────────────────────────────
      - name: Run Docker image (smoke test)
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker run --rm "${IMAGE}:${VERSION}"

