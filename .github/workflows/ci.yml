name: CI Build, Docker and Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.set-version.outputs.new-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Ensure version.txt exists
        run: |
          if [ ! -f version.txt ]; then echo "1.0.0" > version.txt; fi
          echo "current=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Bump patch and update build.gradle.kts
        id: set-version
        run: |
          CUR=$(cat version.txt)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CUR"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "$NEW" > version.txt
          if grep -q 'version = ' build.gradle.kts; then
            sed -i "s/version = \".*\"/version = \"$NEW\"/" build.gradle.kts
          else
            echo "" >> build.gradle.kts
            echo "version = \"$NEW\"" >> build.gradle.kts
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt build.gradle.kts || true
          git commit -m "ci: bump version to $NEW" || echo "no commit"
          git push origin HEAD:main || echo "push skipped or failed"
          echo "new-version=$NEW" >> $GITHUB_OUTPUT

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build fat JAR
        run: ./gradlew clean shadowJar -x test

      - name: Upload artifact (fat JAR)
        uses: actions/upload-artifact@v4
        with:
          name: helloworld-jar
          path: build/libs/*-all.jar

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and tag Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USER }}/helloworld
          VERSION=${{ steps.version.outputs.version }}
          docker build -t $IMAGE:$VERSION .
          docker tag $IMAGE:$VERSION $IMAGE:latest

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USER }}/helloworld
          VERSION=${{ steps.version.outputs.version }}
          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

  run-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and run image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USER }}/helloworld:$(cat version.txt)
          docker pull $IMAGE
          docker run --rm $IMAGE
