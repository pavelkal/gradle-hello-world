name: CI – Build, Package & Push Docker Image

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "master" ]
    # Ignore commits made by the pipeline itself (version bump commits)
    paths-ignore:
      - 'gradle.properties'   # handled separately via [skip ci] tag
  workflow_dispatch:           # allow manual runs from the Actions tab

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to push the version-bump commit back

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build · Package · Dockerize · Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 is needed so we can push the version-bump commit
          fetch-depth: 0

      # ── 2. Bump patch version ────────────────────────────────────────────────
      # Reads appVersion from gradle.properties, increments the PATCH segment
      # (1.0.0 → 1.0.1 → 1.0.2 …), writes it back, and commits + pushes.
      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(grep '^appVersion=' gradle.properties | cut -d'=' -f2)
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Write the bumped version back to gradle.properties
          sed -i "s/^appVersion=.*/appVersion=${NEW_VERSION}/" gradle.properties

          # Expose as step output so later steps can reference it
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit & push bumped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "ci: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      # ── 3. Set up JDK 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Compile & create fat JAR ──────────────────────────────────────────
      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon

      # ── 7. Upload JAR as GitHub Actions artifact ─────────────────────────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-hello-world-${{ steps.version.outputs.version }}
          path: build/libs/gradle-hello-world-*.jar
          if-no-files-found: error

      # ── 8. Log in to Docker Hub ──────────────────────────────────────────────
      # Store DOCKERHUB_USERNAME and DOCKERHUB_TOKEN as repository secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 9. Build Docker image (multistage Dockerfile) ────────────────────────
      # The image is tagged with both the exact version AND "latest".
      - name: Build Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            .

      # ── 10. Push Docker image to Docker Hub ──────────────────────────────────
      - name: Push Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      # ── 11. Smoke-test: pull & run the image ────────────────────────────────
      # Verifies the pushed image actually works .
      - name: Run Docker image (smoke test)
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gradle-hello-world"
          VERSION="${{ steps.version.outputs.version }}"
          docker run --rm "${IMAGE}:${VERSION}"
